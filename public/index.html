<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>칩 카운터</title>
<style>
  :root{
    --felt: #0F4C3A;
    --felt-dark: #0A332B;
    --wood: #1A1410;
    --wood-light: #2A201A;
    --chip-white: #F4F0E6;
    --chip-red: #B23A2E;
    --gold: #C9A227;
    --gold-soft: #E0C158;
    --ink: #F4F0E6;
    --ink-dim: rgba(244,240,230,0.55);
    --danger: #B23A2E;
    --success: #4C8C5C;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body{
    margin:0;
    background: var(--wood);
    background-image:
      radial-gradient(ellipse at 50% -10%, rgba(15,76,58,0.35), transparent 60%);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
    min-height: 100vh;
    padding-bottom: 100px;
  }
  .display{ font-family: "Courier New", "Roboto Mono", monospace; font-weight: 700; }

  /* ===== Join screen ===== */
  #joinScreen{
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  #joinScreen .eyebrow{ font-size: 11px; letter-spacing: 0.18em; color: var(--gold-soft); text-transform: uppercase; margin: 0 0 6px; }
  #joinScreen h1{ font-size: 26px; margin: 0 0 28px; font-weight: 800; }
  .join-card{
    background: linear-gradient(180deg, var(--felt) 0%, var(--felt-dark) 100%);
    border: 1px solid rgba(201,162,39,0.35);
    border-radius: 18px;
    padding: 24px;
    width: 100%;
    max-width: 320px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .join-label{ font-size: 12px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; display:block; text-align:left; }
  .join-card input{
    width: 100%;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(201,162,39,0.3);
    border-radius: 10px;
    color: var(--ink);
    font-size: 18px;
    padding: 12px 14px;
    text-align: center;
    font-family: "Courier New", monospace;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 14px;
  }
  .join-card input:focus{ outline: none; border-color: var(--gold-soft); }
  .join-divider{ display:flex; align-items:center; gap:10px; margin: 18px 0; color: var(--ink-dim); font-size: 12px; }
  .join-divider::before, .join-divider::after{ content:''; flex:1; height:1px; background: rgba(255,255,255,0.1); }

  /* ===== Main app ===== */
  #app{ display:none; }
  header{ padding: 22px 20px 16px; text-align: center; position: relative; }
  .eyebrow{ font-size: 11px; letter-spacing: 0.18em; color: var(--gold-soft); text-transform: uppercase; margin: 0 0 4px; }
  h1{ font-size: 22px; margin: 0; font-weight: 800; letter-spacing: -0.01em; }
  .pot-banner{
    margin: 16px auto 0; max-width: 320px;
    background: linear-gradient(180deg, var(--felt) 0%, var(--felt-dark) 100%);
    border: 1px solid rgba(201,162,39,0.35);
    border-radius: 16px; padding: 14px 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative; overflow: hidden;
  }
  .pot-banner::before{
    content:''; position:absolute; inset:0;
    background: repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255,255,255,0.02) 8px, rgba(255,255,255,0.02) 16px);
  }
  .pot-label{ font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); position: relative; }
  .pot-amount{ font-size: 36px; color: var(--gold-soft); margin-top: 2px; position: relative; }
  .pot-controls{ display:flex; gap:8px; justify-content:center; margin-top:14px; position:relative; }
  .pot-controls input{
    width: 90px; background: rgba(0,0,0,0.25); border: 1px solid rgba(201,162,39,0.3);
    border-radius: 10px; color: var(--ink); font-size: 16px; padding: 9px 10px;
    text-align: center; font-family: inherit;
  }
  .pot-controls input:focus{ outline: none; border-color: var(--gold-soft); }
  .btn{ border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-family: inherit; transition: transform 0.08s ease, filter 0.15s ease; }
  .btn:active{ transform: scale(0.95); }
  .btn-gold{ background: linear-gradient(180deg, var(--gold-soft), var(--gold)); color: #2A1F00; padding: 9px 16px; font-size: 14px; }
  .btn-ghost{ background: rgba(255,255,255,0.06); color: var(--ink); padding: 9px 14px; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); }

  .section{ max-width: 520px; margin: 24px auto 0; padding: 0 16px; }
  .section-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 12px; padding: 0 4px; }
  .section-title{ font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-dim); }
  .buyin-tag{ font-size: 12px; color: var(--gold-soft); }

  .player-card{
    background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 16px; margin-bottom: 12px;
    position: relative; overflow: hidden;
  }
  .player-card.negative{ border-color: rgba(178,58,46,0.4); }
  .player-top{ display:flex; align-items:center; justify-content:space-between; gap: 10px; }
  .player-id{ display:flex; align-items:center; gap:10px; min-width:0; }
  .chip-stack{ width: 38px; height: 38px; flex-shrink:0; position: relative; }
  .chip-stack svg{ width:100%; height:100%; display:block; }
  .player-name-input{
    background: transparent; border: none; color: var(--ink); font-size: 16px; font-weight: 700;
    font-family: inherit; width: 100%; padding: 2px 0; border-bottom: 1px dashed transparent;
  }
  .player-name-input:focus{ outline: none; border-bottom-color: var(--gold-soft); }
  .remove-btn{ background: none; border:none; color: var(--ink-dim); font-size: 18px; cursor: pointer; padding: 4px 6px; line-height: 1; flex-shrink:0; }
  .player-stack-row{ display:flex; align-items:flex-end; justify-content:space-between; margin-top: 12px; }
  .stack-amount{ font-size: 30px; color: var(--chip-white); }
  .stack-amount.neg{ color: var(--danger); }
  .stack-delta{ font-size: 12px; color: var(--ink-dim); margin-top: 2px; }
  .stack-delta.pos{ color: var(--success); }
  .stack-delta.neg{ color: var(--danger); }
  .adjust-row{ display:flex; gap:7px; margin-top: 14px; }
  .chip-btn{
    flex:1; background: rgba(0,0,0,0.22); border: 1px solid rgba(255,255,255,0.08); color: var(--ink);
    border-radius: 10px; padding: 9px 4px; font-size: 13px; font-weight: 700; font-family: inherit; cursor:pointer;
  }
  .chip-btn:active{ transform: scale(0.93); background: rgba(201,162,39,0.18); }
  .chip-btn.minus{ color: #E8A39A; }
  .chip-btn.plus{ color: #9FD4AC; }
  .custom-row{ display:flex; gap:7px; margin-top:8px; }
  .custom-row input{
    flex:1; background: rgba(0,0,0,0.22); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
    color: var(--ink); font-size: 14px; padding: 8px 10px; font-family: inherit; text-align:center;
  }
  .custom-row input:focus{ outline:none; border-color: var(--gold-soft); }
  .custom-row .btn{ padding: 8px 14px; font-size: 13px; }
  .add-player-card{ border: 1.5px dashed rgba(255,255,255,0.18); border-radius: 18px; padding: 16px; display:flex; gap:10px; }
  .add-player-card input{ flex:1; background: transparent; border:none; color: var(--ink); font-size: 15px; font-family: inherit; }
  .add-player-card input::placeholder{ color: var(--ink-dim); }
  .add-player-card input:focus{ outline:none; }
  .empty-state{ text-align:center; color: var(--ink-dim); font-size: 14px; padding: 30px 10px; border: 1px dashed rgba(255,255,255,0.12); border-radius: 16px; }

  .footer-bar{
    position: fixed; bottom: 0; left:0; right:0;
    background: linear-gradient(180deg, rgba(26,20,16,0.4), var(--wood) 30%);
    padding: 14px 16px calc(14px + env(safe-area-inset-bottom));
    display:flex; gap:10px; max-width: 520px; margin: 0 auto;
  }
  .footer-bar .btn{ flex:1; padding: 13px; font-size: 14px; }

  .modal-overlay{
    position:fixed; inset:0; background: rgba(0,0,0,0.6);
    display:flex; align-items:flex-end; justify-content:center; z-index: 50; animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  .modal{
    background: var(--wood-light); border-radius: 20px 20px 0 0; width: 100%; max-width: 520px;
    max-height: 85vh; overflow-y: auto; padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    border-top: 1px solid rgba(201,162,39,0.3);
  }
  .modal h2{ font-size: 18px; margin: 0 0 4px; }
  .modal .sub{ font-size: 13px; color: var(--ink-dim); margin-bottom: 18px; }
  .settle-row{
    display:flex; align-items:center; justify-content:space-between; padding: 12px 14px;
    background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 8px; font-size: 14px;
  }
  .settle-arrow{ color: var(--gold-soft); margin: 0 8px; }
  .settle-amount{ font-family: "Courier New", monospace; font-weight:700; color: var(--gold-soft); }
  .no-settle{ text-align:center; color: var(--ink-dim); padding: 20px; font-size: 14px; }
  .modal-close{ width:100%; margin-top: 16px; padding: 13px; }
  .check-row{ display:flex; justify-content:space-between; padding: 7px 4px; font-size: 13px; color: var(--ink-dim); border-bottom: 1px solid rgba(255,255,255,0.06); }
  .check-row span:last-child{ font-family: "Courier New", monospace; }

  .sync-dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--success); margin-right:5px; box-shadow: 0 0 6px var(--success); transition: background 0.2s; }
  .sync-status{ font-size: 11px; color: var(--ink-dim); text-align:center; margin-top:10px; }
  .room-row{ margin-top:8px; text-align:center; }

  .toast{
    position: fixed; top: 16px; left:50%; transform: translateX(-50%);
    background: rgba(20,15,12,0.95); border: 1px solid rgba(201,162,39,0.4); color: var(--ink);
    padding: 10px 18px; border-radius: 999px; font-size: 13px; z-index: 100;
    opacity:0; transition: opacity 0.25s ease, transform 0.25s ease; pointer-events:none;
    max-width: 85%; text-align: center;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(4px); }
</style>
</head>
<body>

<!-- ===== Join screen ===== -->
<div id="joinScreen">
  <p class="eyebrow">FELT &amp; FRIENDS</p>
  <h1>칩 카운터</h1>
  <div class="join-card">
    <label class="join-label">방 코드로 입장</label>
    <input type="text" id="roomCodeInput" placeholder="예: AB12" maxlength="6">
    <button class="btn btn-gold" id="joinBtn" style="width:100%; padding:13px;">입장하기</button>
    <div class="join-divider">또는</div>
    <button class="btn btn-ghost" id="createBtn" style="width:100%; padding:13px;">새 게임 만들기</button>
  </div>
</div>

<!-- ===== Main app ===== -->
<div id="app">
  <header>
    <p class="eyebrow">FELT &amp; FRIENDS</p>
    <h1>칩 카운터</h1>

    <div class="pot-banner">
      <div class="pot-label">현재 팟</div>
      <div class="pot-amount display" id="potAmount">0</div>
      <div class="pot-controls">
        <input type="number" id="potInput" placeholder="금액" inputmode="numeric">
        <button class="btn btn-gold" id="potAddBtn">팟에 추가</button>
      </div>
      <div class="pot-controls" style="margin-top:8px;">
        <button class="btn btn-ghost" id="potClearBtn" style="flex:1;">팟 비우기 (취소)</button>
      </div>
    </div>
  </header>

  <div class="section">
    <div class="section-head">
      <span class="section-title">플레이어</span>
      <span class="buyin-tag" id="buyinTag">바이인 0</span>
    </div>

    <div id="playerList"></div>

    <div class="add-player-card">
      <input type="text" id="newPlayerName" placeholder="새 플레이어 이름 입력">
      <button class="btn btn-gold" id="addPlayerBtn">추가</button>
    </div>

    <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span id="syncText">연결 중...</span></div>
    <div class="room-row">
      <span style="font-size:12px; color:var(--ink-dim);">방 코드: </span>
      <span id="roomCodeDisplay" style="font-size:13px; color:var(--gold-soft); font-family:'Courier New',monospace; font-weight:700;"></span>
      <button class="btn btn-ghost" id="copyLinkBtn" style="padding:5px 10px; font-size:11px; margin-left:8px;">링크 복사</button>
    </div>
  </div>

  <div class="footer-bar">
    <button class="btn btn-ghost" id="setupBtn">바이인 설정</button>
    <button class="btn btn-gold" id="settleBtn">정산하기</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
