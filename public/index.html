<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>정현이의 토큰 계산 사이트</title>
<style>
  :root{
    --felt: #0F4C3A;
    --felt-dark: #0A332B;
    --wood: #1A1410;
    --wood-light: #2A201A;
    --chip-white: #F4F0E6;
    --chip-red: #B23A2E;
    --gold: #C9A227;
    --gold-soft: #E0C158;
    --ink: #F4F0E6;
    --ink-dim: rgba(244,240,230,0.55);
    --danger: #B23A2E;
    --success: #4C8C5C;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body{
    margin:0;
    background: var(--wood);
    background-image: radial-gradient(ellipse at 50% -10%, rgba(15,76,58,0.35), transparent 60%);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
    min-height: 100vh;
    padding-bottom: 40px;
  }
  .display{ font-family: "Courier New", "Roboto Mono", monospace; font-weight: 700; }

  /* ===== Join / Create screen ===== */
  #joinScreen{
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px; text-align: center;
  }
  #joinScreen .eyebrow{ font-size: 11px; letter-spacing: 0.18em; color: var(--gold-soft); text-transform: uppercase; margin: 0 0 6px; }
  #joinScreen h1{ font-size: 22px; margin: 0 0 28px; font-weight: 800; line-height:1.4; }
  .join-card{
    background: linear-gradient(180deg, var(--felt) 0%, var(--felt-dark) 100%);
    border: 1px solid rgba(201,162,39,0.35); border-radius: 18px; padding: 24px;
    width: 100%; max-width: 320px; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .join-tabs{ display:flex; gap:8px; margin-bottom:18px; }
  .join-tab{
    flex:1; padding:9px; border-radius:10px; border:1px solid rgba(255,255,255,0.12);
    background:rgba(0,0,0,0.2); color:var(--ink-dim); font-size:13px; font-weight:700; cursor:pointer;
  }
  .join-tab.active{ background: linear-gradient(180deg, var(--gold-soft), var(--gold)); color:#2A1F00; border-color:transparent; }
  .join-label{ font-size: 12px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; display:block; text-align:left; }
  .join-card input{
    width: 100%; background: rgba(0,0,0,0.25); border: 1px solid rgba(201,162,39,0.3);
    border-radius: 10px; color: var(--ink); font-size: 16px; padding: 12px 14px;
    text-align: center; font-family: inherit; margin-bottom: 14px;
  }
  .join-card input.code-input{ font-family:"Courier New",monospace; text-transform:uppercase; letter-spacing:0.1em; font-size:18px; }
  .join-card input:focus{ outline: none; border-color: var(--gold-soft); }
  .pane{ display:none; }
  .pane.active{ display:block; }

  .btn{ border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-family: inherit; transition: transform 0.08s ease, filter 0.15s ease; }
  .btn:active{ transform: scale(0.95); }
  .btn-gold{ background: linear-gradient(180deg, var(--gold-soft), var(--gold)); color: #2A1F00; padding: 9px 16px; font-size: 14px; }
  .btn-ghost{ background: rgba(255,255,255,0.06); color: var(--ink); padding: 9px 14px; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); }
  .btn-wide{ width:100%; padding:13px; }
  .btn:disabled{ opacity:0.35; cursor:not-allowed; }

  /* ===== Main app ===== */
  #app{ display:none; }
  header{ padding: 22px 20px 16px; text-align: center; position: relative; }
  .eyebrow{ font-size: 11px; letter-spacing: 0.18em; color: var(--gold-soft); text-transform: uppercase; margin: 0 0 4px; }
  h1{ font-size: 19px; margin: 0; font-weight: 800; letter-spacing: -0.01em; line-height:1.3; }

  .pot-banner{
    margin: 16px auto 0; max-width: 320px;
    background: linear-gradient(180deg, var(--felt) 0%, var(--felt-dark) 100%);
    border: 1px solid rgba(201,162,39,0.35); border-radius: 16px; padding: 14px 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
    position: relative; overflow: hidden;
  }
  .pot-banner::before{
    content:''; position:absolute; inset:0;
    background: repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255,255,255,0.02) 8px, rgba(255,255,255,0.02) 16px);
  }
  .pot-label{ font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim); position: relative; }
  .pot-amount{ font-size: 36px; color: var(--gold-soft); margin-top: 2px; position: relative; }

  /* ===== Current turn banner ===== */
  .turn-banner{
    margin: 14px auto 0; max-width: 320px;
    border-radius: 14px; padding: 12px 18px;
    text-align:center;
    background: rgba(201,162,39,0.12);
    border: 1px solid rgba(201,162,39,0.4);
  }
  .turn-banner.me{
    background: linear-gradient(180deg, rgba(201,162,39,0.28), rgba(201,162,39,0.12));
    border-color: var(--gold-soft);
    box-shadow: 0 0 18px rgba(201,162,39,0.25);
  }
  .turn-banner-label{ font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink-dim); }
  .turn-banner-name{ font-size:18px; font-weight:800; color: var(--gold-soft); margin-top:2px; }
  .turn-banner-name.youtag::after{ content: ' (내 차례!)'; font-size:13px; color: var(--ink); font-weight:700; }

  .section{ max-width: 520px; margin: 18px auto 0; padding: 0 16px; }
  .section-head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom: 12px; padding: 0 4px; }
  .section-title{ font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-dim); }
  .buyin-tag{ font-size: 12px; color: var(--gold-soft); }

  .player-card{
    background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
    border: 1px solid rgba(255,255,255,0.08); border-radius: 18px; padding: 16px; margin-bottom: 12px;
    position: relative; overflow: hidden;
  }
  .player-card.me{ border-color: rgba(201,162,39,0.5); box-shadow: 0 0 0 1px rgba(201,162,39,0.15) inset; }
  .player-card.bankrupt{ opacity: 0.45; }
  .player-card.its-turn{ border-color: var(--gold-soft); box-shadow: 0 0 0 1px rgba(201,162,39,0.3) inset, 0 0 16px rgba(201,162,39,0.15); }
  .player-top{ display:flex; align-items:center; justify-content:space-between; gap: 10px; }
  .player-id{ display:flex; align-items:center; gap:10px; min-width:0; flex-wrap:wrap; }
  .chip-stack{ width: 34px; height: 34px; flex-shrink:0; }
  .chip-stack svg{ width:100%; height:100%; display:block; }
  .player-name{ font-size: 15px; font-weight: 700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .me-tag{ font-size:10px; color: var(--gold-soft); border:1px solid rgba(201,162,39,0.4); border-radius:999px; padding:1px 7px; margin-left:4px; vertical-align:1px; }
  .turn-tag{ font-size:10px; color: #2A1F00; background: var(--gold-soft); border-radius:999px; padding:1px 7px; margin-left:4px; vertical-align:1px; font-weight:800; }
  .bankrupt-tag{ font-size:10px; color: var(--chip-red); border:1px solid rgba(178,58,46,0.4); border-radius:999px; padding:1px 7px; margin-left:4px; vertical-align:1px; }
  .player-stack-row{ display:flex; align-items:flex-end; justify-content:space-between; margin-top: 10px; }
  .stack-amount{ font-size: 26px; color: var(--chip-white); }

  .pending-row{
    display:flex; align-items:center; justify-content:space-between;
    margin-top:10px; padding:8px 12px; background:rgba(0,0,0,0.25); border-radius:10px;
    font-size:13px; color:var(--ink-dim);
  }
  .pending-row .val{ color: var(--gold-soft); font-family:"Courier New",monospace; font-weight:700; font-size:16px; }

  .bet-row{ display:flex; gap:7px; margin-top: 10px; }
  .bet-btn{
    flex:1; background: rgba(0,0,0,0.22); border: 1px solid rgba(255,255,255,0.08); color: var(--ink);
    border-radius: 10px; padding: 11px 4px; font-size: 13px; font-weight: 700; font-family: inherit; cursor:pointer;
  }
  .bet-btn:active{ transform: scale(0.93); background: rgba(201,162,39,0.18); }
  .bet-btn.allin{ color: var(--chip-red); border-color: rgba(178,58,46,0.4); }
  .bet-btn:disabled{ opacity:0.35; cursor:not-allowed; }

  .confirm-row{ display:flex; gap:7px; margin-top:8px; }
  .confirm-row .btn{ flex:1; padding:10px; font-size:13px; }

  .winner-btn{
    margin-top: 10px; width:100%; padding:10px; font-size:13px;
    background: rgba(201,162,39,0.12); border:1px dashed rgba(201,162,39,0.4); color: var(--gold-soft);
    border-radius:10px; cursor:pointer; font-family:inherit; font-weight:700;
  }
  .winner-btn:active{ transform: scale(0.97); }

  .host-panel{ max-width:520px; margin: 0 auto 18px; padding: 0 16px; }
  .host-panel-inner{
    border: 1px dashed rgba(201,162,39,0.35); border-radius:14px; padding:12px 14px;
    font-size:12px; color: var(--ink-dim); text-align:center;
  }

  .empty-state{ text-align:center; color: var(--ink-dim); font-size: 14px; padding: 30px 10px; border: 1px dashed rgba(255,255,255,0.12); border-radius: 16px; }

  .room-row{ text-align:center; margin-top: 18px; }
  .sync-dot{ display:inline-block; width:6px; height:6px; border-radius:50%; background: var(--success); margin-right:5px; box-shadow: 0 0 6px var(--success); transition: background 0.2s; }
  .sync-status{ font-size: 11px; color: var(--ink-dim); }

  .modal-overlay{
    position:fixed; inset:0; background: rgba(0,0,0,0.6);
    display:flex; align-items:flex-end; justify-content:center; z-index: 50; animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn{ from{opacity:0} to{opacity:1} }
  .modal{
    background: var(--wood-light); border-radius: 20px 20px 0 0; width: 100%; max-width: 520px;
    max-height: 85vh; overflow-y: auto; padding: 24px 20px calc(24px + env(safe-area-inset-bottom));
    border-top: 1px solid rgba(201,162,39,0.3);
  }
  .modal h2{ font-size: 18px; margin: 0 0 4px; }
  .modal .sub{ font-size: 13px; color: var(--ink-dim); margin-bottom: 18px; }
  .winner-option{
    display:flex; align-items:center; justify-content:space-between; padding: 13px 14px;
    background: rgba(0,0,0,0.2); border-radius: 12px; margin-bottom: 8px; font-size: 15px; cursor:pointer;
    border: 1px solid transparent;
  }
  .winner-option:active{ border-color: var(--gold-soft); }
  .winner-option .bal{ color: var(--ink-dim); font-family:"Courier New",monospace; font-size:13px; }
  .modal-close{ width:100%; margin-top: 14px; padding: 13px; }

  .toast{
    position: fixed; top: 16px; left:50%; transform: translateX(-50%);
    background: rgba(20,15,12,0.95); border: 1px solid rgba(201,162,39,0.4); color: var(--ink);
    padding: 10px 18px; border-radius: 999px; font-size: 13px; z-index: 100;
    opacity:0; transition: opacity 0.25s ease, transform 0.25s ease; pointer-events:none;
    max-width: 85%; text-align: center;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(4px); }
</style>
</head>
<body>

<!-- ===== Join / Create screen ===== -->
<div id="joinScreen">
  <p class="eyebrow">TOKEN TABLE</p>
  <h1>정현이의<br>토큰 계산 사이트</h1>
  <div class="join-card">
    <div class="join-tabs">
      <button class="join-tab active" id="tabCreate">방 만들기</button>
      <button class="join-tab" id="tabJoin">방 입장</button>
    </div>

    <div class="pane active" id="paneCreate">
      <label class="join-label">방장 이름</label>
      <input type="text" id="hostNameInput" placeholder="이름 입력" maxlength="20">
      <label class="join-label">인당 보유 금액</label>
      <input type="number" id="buyInInput" placeholder="예: 1000" inputmode="numeric">
      <label class="join-label">입장료 (참가하면 즉시 차감)</label>
      <input type="number" id="anteInput" placeholder="예: 100" inputmode="numeric">
      <button class="btn btn-gold btn-wide" id="createBtn">방 만들기</button>
    </div>

    <div class="pane" id="paneJoin">
      <label class="join-label">방 코드</label>
      <input type="text" id="roomCodeInput" class="code-input" placeholder="예: AB12" maxlength="6">
      <label class="join-label">내 이름</label>
      <input type="text" id="playerNameInput" placeholder="이름 입력" maxlength="20">
      <button class="btn btn-gold btn-wide" id="joinBtn">입장하기</button>
    </div>
  </div>
</div>

<!-- ===== Main app ===== -->
<div id="app">
  <header>
    <p class="eyebrow">TOKEN TABLE</p>
    <h1>정현이의 토큰 계산 사이트</h1>
    <div class="pot-banner">
      <div class="pot-label">총 베팅된 토큰</div>
      <div class="pot-amount display" id="potAmount">0</div>
    </div>
    <div class="turn-banner" id="turnBanner">
      <div class="turn-banner-label">현재 차례</div>
      <div class="turn-banner-name" id="turnBannerName">-</div>
    </div>
  </header>

  <div class="host-panel" id="hostPanel" style="display:none;">
    <div class="host-panel-inner">👑 방장 모드 — 게임이 끝나면 아래에서 승자를 지정하면 팟이 지급되고, 다음 판은 승자부터 시작해요</div>
    <button class="btn btn-gold btn-wide" id="openWinnerModalBtn" style="margin-top:10px;">승자 지정하기</button>
  </div>

  <div class="section">
    <div class="section-head">
      <span class="section-title">플레이어</span>
      <span class="buyin-tag" id="buyinTag">보유 0 · 입장료 0</span>
    </div>

    <div id="playerList"></div>

    <div class="room-row">
      <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span id="syncText">연결 중...</span></div>
      <div style="margin-top:8px;">
        <span style="font-size:12px; color:var(--ink-dim);">방 코드: </span>
        <span id="roomCodeDisplay" style="font-size:13px; color:var(--gold-soft); font-family:'Courier New',monospace; font-weight:700;"></span>
        <button class="btn btn-ghost" id="copyLinkBtn" style="padding:5px 10px; font-size:11px; margin-left:8px;">링크 복사</button>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
